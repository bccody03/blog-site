name: Sync Substack posts

on:
  push:
    branches: [main]
    paths:
      - scripts/fetch-posts.mjs
      - .github/workflows/sync-posts.yml
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-posts
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build posts.json from Substack archive
        run: node scripts/fetch-posts.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update posts.json from Substack archive"
            git push
          fi
