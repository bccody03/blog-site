<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Recreation of the My JRNL app icon: red base, cream page, script "My",
       big serif "JRNL", ruled lines, yellow pencil lying across the bottom. -->
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="180" height="180" rx="40" ry="40"/>
    </clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <!-- red cover peeking out at the edges -->
    <rect x="0" y="0" width="180" height="180" fill="#a63a2b"/>
    <!-- cream page -->
    <rect x="6" y="0" width="174" height="174" rx="14" ry="14" fill="#f3ecdb"/>
    <!-- ruled lines on the lower half -->
    <g stroke="#b9c0c3" stroke-width="1.6">
      <line x1="6" y1="112" x2="180" y2="112"/>
      <line x1="6" y1="128" x2="180" y2="128"/>
      <line x1="6" y1="144" x2="180" y2="144"/>
      <line x1="6" y1="160" x2="180" y2="160"/>
    </g>
    <!-- "My" in italic script -->
    <text x="93" y="46" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="400" font-size="34" fill="#2a2420">My</text>
    <!-- "JRNL" in heavy serif -->
    <text x="93" y="98" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-weight="600" font-size="52" letter-spacing="1" fill="#1e1a16">JRNL</text>
    <!-- pencil lying across the ruled lines -->
    <g transform="translate(20 138) rotate(-4)">
      <!-- shadow -->
      <ellipse cx="72" cy="18" rx="64" ry="5" fill="rgba(60,45,30,0.15)"/>
      <!-- eraser -->
      <rect x="0" y="2" width="16" height="14" rx="5" fill="#e2a49a"/>
      <!-- ferrule -->
      <rect x="13" y="2" width="10" height="14" fill="#c9cdd2"/>
      <line x1="16" y1="2" x2="16" y2="16" stroke="#9aa0a8" stroke-width="1.4"/>
      <line x1="20" y1="2" x2="20" y2="16" stroke="#9aa0a8" stroke-width="1.4"/>
      <!-- body -->
      <rect x="23" y="2" width="92" height="14" fill="#e8b232"/>
      <line x1="23" y1="6.5" x2="115" y2="6.5" stroke="#c9931f" stroke-width="2"/>
      <line x1="23" y1="11.5" x2="115" y2="11.5" stroke="#c9931f" stroke-width="2"/>
      <!-- sharpened tip -->
      <polygon points="115,2 138,9 115,16" fill="#e7cf9f"/>
      <polygon points="131,6.9 138,9 131,11.1" fill="#4a4038"/>
    </g>
  </g>
</svg>
